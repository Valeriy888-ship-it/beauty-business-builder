name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        # Собираем в стандартном режиме, без переменных окружения Nitro, чтобы билд прошел успешно
        run: bun run build

      - name: Assemble SPA index.html
        # Собираем правильную структуру HTML, подключая скомпилированные ассеты фреймворка
        run: |
          cat << 'EOF' > .output/public/index.html
          <!DOCTYPE html>
          <html lang="ru">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Beauty Business Builder</title>
              <link rel="icon" type="image/x-icon" href="./favicon.ico" />
              <link rel="stylesheet" href="./assets/styles-C_SKJCSl.css" />
              <script type="module" src="./assets/index-S2rKHma9.js" async></script>
            </head>
            <body>
              <div id="root"></div>
              <script type="module">
                // Инициализируем гидратацию TanStack роутера для SPA-режима
                window.__TSR_MANIFEST__ = {
                  "routes": {
                    "__root": { "assets": ["./assets/routes-B2jmSv3b.js", "./assets/styles-C_SKJCSl.css"] }
                  }
                };
              </script>
            </head>
          </html>
          EOF
          echo "Архитектура SPA index.html успешно сформирована."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.output/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
