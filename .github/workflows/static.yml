name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      # Nitro static preset — генерирует полностью статический сайт в .output/public,
      # с index.html, 404.html и .nojekyll (нужен для GitHub Pages).
      NITRO_PRESET: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static site
        run: bun run build

      - name: Ensure SPA fallback and Jekyll disabled
        run: |
          cp -f .output/public/index.html .output/public/404.html 2>/dev/null || true
          touch .output/public/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ".output/public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
