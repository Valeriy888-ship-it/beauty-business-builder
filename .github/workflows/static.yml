name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build client bundle
        # Обычный vite build (без NITRO_PRESET) — генерирует клиентские
        # ассеты в .output/public/assets с хешированными именами.
        run: bun run build

      - name: Assemble index.html and 404.html from real asset hashes
        run: |
          set -euo pipefail
          PUB=.output/public

          # Находим реальные имена собранных ассетов (хеши меняются каждую сборку).
          CSS=$(basename "$(ls "$PUB"/assets/styles-*.css | head -n1)")
          JS=$(basename "$(ls "$PUB"/assets/index-*.js | head -n1)")

          echo "CSS asset: $CSS"
          echo "JS asset:  $JS"

          cat > "$PUB/index.html" <<HTML
          <!DOCTYPE html>
          <html lang="ru">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Панков System — инженерия beauty-бизнеса</title>
              <meta name="description" content="Метод построения устойчивого beauty-бизнеса с доходом 150 000+ рублей." />
              <link rel="icon" type="image/x-icon" href="./favicon.ico" />
              <link rel="stylesheet" href="./assets/${CSS}" />
              <script type="module" src="./assets/${JS}"></script>
            </head>
            <body>
              <div id="root"></div>
            </body>
          </html>
          HTML

          # 404-фолбэк для SPA-роутинга на GitHub Pages.
          cp "$PUB/index.html" "$PUB/404.html"

          # Отключаем Jekyll (иначе GH Pages игнорит файлы, начинающиеся с _).
          touch "$PUB/.nojekyll"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ".output/public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
