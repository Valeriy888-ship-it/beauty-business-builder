name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Inject SPA entry point
        # Автоматически создаем index.html, который подтянет ваши скомпилированные скрипты и запустит React
        run: |
          cat << 'EOF' > .output/public/index.html
          <!DOCTYPE html>
          <html lang="ru">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Beauty Business Builder</title>
              <link rel="icon" type="image/x-icon" href="./favicon.ico" />
              <script type="module">
                // Автоматический поиск и запуск главного скомпилированного js-файла фреймворка
                import('./assets/index-S2rKHma9.js').catch(console.error);
              </script>
            </head>
            <body>
              <div id="root"></div>
            </body>
          </html>
          EOF
          echo "Файл index.html успешно сгенерирован в .output/public"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.output/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
